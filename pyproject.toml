[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "lake-agent"
version = "0.1.0"
description = "Multi-modal data lake inventory and question answering"
requires-python = ">=3.11"
dependencies = [
    "langchain>=0.3,<0.4",
    "langchain-postgres>=0.0.15,<0.1",
    "langchain-openai>=0.3,<0.4",
    "minio>=7.2,<8",
    "pydantic>=2.0,<3",
    "psycopg[binary]>=3.2,<4",
    "python-dotenv>=1.0,<2",
]

[project.scripts]
lake-inventory = "lake_agent.cli.inventory:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
