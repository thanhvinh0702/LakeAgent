services:
  postgres:
    image: postgres:16
    container_name: lakeagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lakeagent
      POSTGRES_PASSWORD: lakeagent123
      POSTGRES_DB: lakeagent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: